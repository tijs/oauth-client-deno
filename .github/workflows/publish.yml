name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish-jsr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Verify code quality
        run: |
          git ls-files '*.ts' '*.js' '*.tsx' '*.jsx' | xargs -r deno fmt --check
          git ls-files '*.ts' '*.js' '*.tsx' '*.jsx' | xargs -r deno lint
          git ls-files '*.ts' | xargs -r deno check

      - name: Run tests
        run: deno test --allow-all

      - name: Publish to JSR
        run: deno publish

  publish-npm:
    runs-on: ubuntu-latest
    needs: publish-jsr
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Build npm package
        run: deno task build:npm

      - name: Publish to npm
        run: cd npm && npm publish --provenance --access public
